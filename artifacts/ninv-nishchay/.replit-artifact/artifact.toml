kind = "web"
previewPath = "/"
title = "Ninv Nishchay Foundation"
version = "1.0.0"
id = "artifacts/ninv-nishchay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23935

[services.development]
run = "pnpm --filter @workspace/ninv-nishchay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ninv-nishchay", "run", "build" ]
publicDir = "artifacts/ninv-nishchay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23935"
BASE_PATH = "/"
